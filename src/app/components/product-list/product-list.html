<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h2 class="mb-0">
                <i class="bi bi-box-seam-fill"></i>
                Product List
            </h2>

        </div>

        <div class="card-body">

            <!-- Search + Low Stock Filter -->
            <div class="row mb-4 align-items-center">

                <div class="col-md-5">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="🔍 Search by Product Name or SKU"
                        [(ngModel)]="searchText"
                        (input)="searchProduct()">

                </div>

                <div class="col-md-4">

                    <div class="form-check mt-2">

                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="lowStock"
                            [(ngModel)]="showLowStockOnly"
                            (change)="searchProduct()">

                        <label class="form-check-label fw-bold" for="lowStock">

                            Show Low Stock Only

                        </label>

                    </div>

                </div>

            </div>

            <!-- Table -->
            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                        <tr>

                            <th>Product Name</th>
                            <th>SKU</th>
                            <th>Quantity</th>
                            <th>Reorder Level</th>
                            <th width="180">Actions</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr *ngFor="let product of filteredProducts">

                            <td>

                                <strong>{{ product.name }}</strong>

                            </td>

                            <td>

                                <span class="badge bg-secondary">

                                    {{ product.sku }}

                                </span>

                            </td>

                            <td>

    <div class="d-flex align-items-center">

        <button
            class="btn btn-danger btn-sm"
            (click)="decreaseStock(product)">

            <i class="bi bi-dash"></i>

        </button>

        <span
            class="badge mx-2"
            [ngClass]="product.quantity > product.reorderLevel ? 'bg-success' : 'bg-danger'">

            {{ product.quantity }}

        </span>

        <button
            class="btn btn-success btn-sm"
            (click)="increaseStock(product)">

            <i class="bi bi-plus"></i>

        </button>

    </div>

</td>

                            <td>

                                {{ product.reorderLevel }}

                            </td>

                            <td>

                                <button
                                    class="btn btn-warning btn-sm me-2"
                                    (click)="editProduct(product)">

                                    <i class="bi bi-pencil-fill"></i>
                                    Edit

                                </button>

                                <button
                                    class="btn btn-danger btn-sm"
                                    (click)="deleteProduct(product.id!)">

                                    <i class="bi bi-trash-fill"></i>
                                    Delete

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <div
                class="text-center text-muted mt-4"
                *ngIf="filteredProducts.length === 0">

                <h5>

                    <i class="bi bi-search"></i>

                    No Products Found

                </h5>

            </div>

        </div>

    </div>

</div>
