<div class="container-fluid p-4">

    <div class="row mb-4">
        <div class="col">

            <div class="card shadow border-0">
                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>
                        <h1 class="fw-bold text-primary">
                            <i class="bi bi-box-seam"></i>
                            StockHive Dashboard
                        </h1>

                        <p class="text-muted mb-0">
                            Inventory Management System
                        </p>
                    </div>

                    <div>
                        <button class="btn btn-danger" (click)="logout()">
                            <i class="bi bi-box-arrow-right"></i>
                            Logout
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card dashboard-card bg-primary text-white">

                <div class="card-body text-center">

                    <i class="bi bi-plus-circle display-3"></i>

                    <h3 class="mt-3">
                        Add Product
                    </h3>

                    <p>Add new inventory items.</p>

                    <button
                        class="btn btn-light"
                        (click)="goToAddProduct()">

                        Open

                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card dashboard-card bg-success text-white">

                <div class="card-body text-center">

                    <i class="bi bi-table display-3"></i>

                    <h3 class="mt-3">
                        Product List
                    </h3>

                    <p>Manage available products.</p>

                    <button
                        class="btn btn-light"
                        (click)="goToProductList()">

                        Open

                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card dashboard-card bg-warning text-dark">

                <div class="card-body text-center">

                    <i class="bi bi-clock-history display-3"></i>

                    <h3 class="mt-3">
                        Stock History
                    </h3>

                    <p>Track all inventory updates.</p>

                    <button
                        class="btn btn-dark"
                        (click)="goToStockHistory()">

                        Open

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
